<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<title>Nueva Cotización | CELICA</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
	<link rel="stylesheet" href="../assets/css/styles.css">
	<link rel="icon" type="image/x-icon" href="../assets/img/favicon.ico">
</head>
<body>
	<mi-header></mi-header>
	<div class="container mt-4">

		<div class="page-header">
			<div>
				<h3><i class="bi bi-file-earmark-plus" style="color:var(--celica-primary)"></i> Nueva Cotización</h3>
				<p>Selecciona el cliente, agrega camiones y sus servicios para armar la cotización.</p>
			</div>
		</div>

		<!-- Datos del cliente -->
		<div class="section-card mb-4">
			<div class="section-card-header">
				<h5><i class="bi bi-person-badge"></i> Datos del cliente</h5>
			</div>

			<div class="row g-3 header-form">
				<div class="col-md-4">
					<label class="form-label">Cliente</label>
					<select id="selectCliente" class="form-select"></select>
					<button class="btn btn-sm btn-outline-secondary mt-2" id="btnClienteManual">
						<i class="bi bi-pencil-square"></i> Cliente manual
					</button>
				</div>
				<div class="col-md-4">
					<label class="form-label">Nombre</label>
					<input type="text" class="form-control" id="inputClienteNombre">
				</div>
				<div class="col-md-4">
					<label class="form-label">Dirección</label>
					<select id="selectDireccion" class="form-select"></select>
				</div>
			</div>

			<div class="row g-3 mt-1">
				<div class="col-md-3">
					<label class="form-label">DNI</label>
					<input type="text" class="form-control" id="inputDNI">
				</div>
				<div class="col-md-3">
					<label class="form-label">RTN</label>
					<input type="text" class="form-control" id="inputRTN">
				</div>
				<div class="col-md-3">
					<label class="form-label">Fecha</label>
					<input type="date" class="form-control" id="fechaCotizacion">
				</div>
			</div>
		</div>

		<!-- Selección de camión -->
		<div class="section-card mb-4">
			<div class="section-card-header">
				<h5><i class="bi bi-truck"></i> Camión</h5>
			</div>

			<div class="row g-3 align-items-end">
				<div class="col-md-8">
					<label class="form-label">Seleccionar camión</label>
					<select id="selectCamion" class="form-select"></select>
				</div>
				<div class="col-md-4">
					<div class="d-flex flex-wrap gap-2">
						<button id="btnAgregarCamion" class="btn btn-primary flex-fill">
							<i class="bi bi-plus-lg"></i> Agregar camión
						</button>
						<button id="btnAgregarPorcentajeServicio" class="btn btn-warning flex-fill">
							<i class="bi bi-percent"></i> Porcentaje de servicio
						</button>
						<button id="btnCambiarCamion" class="btn btn-outline-primary flex-fill" style="display:none;">
							<i class="bi bi-arrow-repeat"></i> Cambiar camión
						</button>
					</div>
				</div>
			</div>
		</div>

		<!-- Camiones y servicios agregados (contenido dinámico) -->
		<div id="camionesContainer"></div>

		<!-- Totales y acciones -->
		<div class="section-card mt-4">
			<div class="text-end mb-3">
				<div>Subtotal: <strong><span id="subtotal">L 0.00</span></strong></div>
				<div>ISV 15%: <strong><span id="isv">L 0.00</span></strong></div>
				<div class="fs-5">Total: <strong><span id="total">L 0.00</span></strong></div>
			</div>

			<div class="d-flex flex-wrap gap-2">
				<button id="btnGuardar" class="btn btn-outline-primary">
					<i class="bi bi-save"></i> Guardar parcial
				</button>
				<button id="btnEmitir" class="btn btn-success">
					<i class="bi bi-send-check"></i> Generar cotización
				</button>
				<button id="btnAnular" class="btn btn-outline-danger">
					<i class="bi bi-x-circle"></i> Anular cotización
				</button>
			</div>
		</div>

	</div>

	<script type="module" src="../assets/js/supabase.js"></script>
	<script type="module" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
	<script type="module">
		import { supabase } from '../assets/js/supabase.js'
		const btnLogout = document.getElementById('btn-logout');
		btnLogout.addEventListener('click', async () =>
		{
				const { error } = await supabase.auth.signOut();
				if (error)
					console.error('Error al cerrar sesión:', error.message);
				else 
					window.location.href = 'login.html';
		});
	</script>
	<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.28/dist/jspdf.plugin.autotable.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
	<script type="module" src="../assets/js/cotizaciones.js"></script>
</body>
</html>
