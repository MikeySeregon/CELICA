<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tipos de Camión | CELICA</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
	<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
	<mi-header></mi-header>
	<div class="container mt-4">

		<div class="page-header">
			<div>
				<h3><i class="bi bi-truck-flatbed" style="color:var(--celica-primary)"></i> Tipos de Camión</h3>
				<p>Categorías usadas para clasificar la flota y asignar precios por servicio.</p>
			</div>
		</div>

		<!-- Formulario de creación / edición -->
		<div class="section-card mb-4">
			<div class="section-card-header">
				<h5><i class="bi bi-plus-circle"></i> <span id="formTitulo">Agregar tipo de camión</span></h5>
			</div>

			<form id="formTipoCamion">
				<input type="hidden" id="id_tipo" value="">
				<div class="row g-3">
					<div class="col-md-6">
						<label for="tipo" class="form-label">Tipo de camión</label>
						<input type="text" class="form-control" id="tipo" placeholder="Ej. Cisterna" required>
					</div>
					<div class="col-md-6">
						<label for="descripcion" class="form-label">Descripción</label>
						<input type="text" class="form-control" id="descripcion" placeholder="Opcional">
					</div>
				</div>

				<div class="mt-3 d-flex gap-2">
					<button type="submit" class="btn btn-primary" id="btnGuardar">
						<i class="bi bi-save"></i> Guardar
					</button>
					<button type="button" class="btn btn-outline-secondary" id="btnCancelar">
						<i class="bi bi-x-lg"></i> Cancelar
					</button>
				</div>
			</form>
		</div>

		<!-- Filtro y tabla -->
		<div class="section-card">
			<div class="section-card-header">
				<h5><i class="bi bi-funnel"></i> Filtrar</h5>
			</div>

			<div class="btn-group mb-3" role="group" id="filtrosEstado">
				<button type="button" class="btn btn-outline-secondary btn-sm filtro-estado active" data-estado="">Todos</button>
				<button type="button" class="btn btn-outline-success btn-sm filtro-estado" data-estado="1">Activos</button>
				<button type="button" class="btn btn-outline-danger btn-sm filtro-estado" data-estado="2">Inactivos</button>
			</div>

			<div class="table-responsive">
				<table class="table table-striped table-hover align-middle mb-0" id="tablaTiposCamion">
					<thead>
						<tr>
						<th>ID</th>
						<th>Tipo</th>
						<th>Descripción</th>
						<th>Estado</th>
						<th>Acciones</th>
						</tr>
					</thead>
					<tbody></tbody>
				</table>
			</div>
		</div>
	</div>

	<script type="module" src="../assets/js/supabase.js"></script>
	<script type="module" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
	<script type="module">
		import { supabase } from '../assets/js/supabase.js'
		const btnLogout = document.getElementById('btn-logout');
		btnLogout.addEventListener('click', async () =>
		{
				const { error } = await supabase.auth.signOut();
				if (error)
					console.error('Error al cerrar sesión:', error.message);
				else 
					window.location.href = 'login.html';
		});
	</script>
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
	<script type="module" src="../assets/js/tipos_camion.js"></script>
</body>
</html>
