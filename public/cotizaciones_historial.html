<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<title>Historial de Cotizaciones | CELICA</title>

	<!-- Bootstrap -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

	<!-- Tipografía y sistema de diseño CELICA -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
	<link rel="stylesheet" href="../assets/css/styles.css">

	<!-- DataTables -->
	<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
	<link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.bootstrap5.min.css">

	<style>
		table th, table td {
			vertical-align: middle;
			text-align: center;
		}
	</style>
</head>
<body>

	<mi-header></mi-header>

	<div class="container mt-4">

		<div class="page-header">
			<div>
				<h3><i class="bi bi-clock-history" style="color:var(--celica-primary)"></i> Historial de Cotizaciones</h3>
				<p>Consulta, filtra y da seguimiento a todas las cotizaciones.</p>
			</div>
			<a href="cotizaciones.html" class="btn btn-success">
				<i class="bi bi-plus-lg"></i> Nueva Cotización
			</a>
		</div>

		<div class="section-card">
			<div class="section-card-header">
				<h5><i class="bi bi-funnel"></i> Filtrar por estado</h5>
			</div>

			<div class="btn-group flex-wrap mb-3" role="group" id="filtrosEstado">
				<button type="button" class="btn btn-outline-secondary btn-sm filtro-estado active" data-estado="">
					Todas
				</button>
				<button type="button" class="btn btn-outline-primary btn-sm filtro-estado" data-estado="5">
					<i class="bi bi-send-check"></i> Emitidas
				</button>
				<button type="button" class="btn btn-outline-success btn-sm filtro-estado" data-estado="8">
					<i class="bi bi-check-circle"></i> Aprobadas
				</button>
				<button type="button" class="btn btn-outline-warning btn-sm filtro-estado" data-estado="7">
					<i class="bi bi-hourglass-split"></i> Parciales
				</button>
				<button type="button" class="btn btn-outline-danger btn-sm filtro-estado" data-estado="6">
					<i class="bi bi-x-circle"></i> Anuladas
				</button>
			</div>

			<table id="tablaCotizaciones" class="table table-striped table-bordered nowrap w-100">
				<thead class="table-light">
					<tr>
						<th>ID</th>
						<th>Cliente</th>
						<th>Fecha</th>
						<th>Estado</th>
						<th>Total</th>
						<th>Acciones</th>
					</tr>
				</thead>
				<tbody>
					<!-- Se llena por JS -->
				</tbody>
			</table>
		</div>
	</div>

	<!-- ================= MODAL DETALLE ================= -->
	<div class="modal fade" id="modalDetalleCotizacion" tabindex="-1" aria-hidden="true">
		<div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title"><i class="bi bi-file-earmark-text"></i> Detalle de Cotización</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>

				<div class="modal-body">
					<div class="mb-3">
						<strong>Cliente:</strong>
						<span id="detalleCliente"></span>
					</div>
					<div class="mb-3">
						<strong>Fecha:</strong>
						<span id="detalleFecha"></span>
					</div>

					<div class="table-responsive">
						<table class="table table-sm table-bordered">
							<thead class="table-light">
								<tr>
									<th>Código</th>
									<th>Cant.</th>
									<th>Descripción</th>
									<th>Precio</th>
									<th>Total</th>
								</tr>
							</thead>
							<tbody id="detalleLineas">
								<!-- JS -->
							</tbody>
						</table>
					</div>

					<div class="text-end mt-3">
						<div>Subtotal: <strong><span id="detalleSubtotal">0.00</span></strong></div>
						<div>ISV 15%: <strong><span id="detalleIsv">0.00</span></strong></div>
						<div>Total: <strong><span id="detalleTotal">0.00</span></strong></div>
					</div>
				</div>

				<div class="modal-footer">
					<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
						Cerrar
					</button>
				</div>
			</div>
		</div>
	</div>

	<script type="module">
		import { supabase } from '../assets/js/supabase.js'
		const btnLogout = document.getElementById('btn-logout');
		btnLogout.addEventListener('click', async () =>
		{
				const { error } = await supabase.auth.signOut();
				if (error)
					console.error('Error al cerrar sesión:', error.message);
				else 
					window.location.href = 'login.html';
		});
	</script>

	<!-- Bootstrap -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

	<!-- DataTables -->
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
	<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
	<script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
	<script src="https://cdn.datatables.net/responsive/2.5.0/js/responsive.bootstrap5.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

	<!-- SweetAlert2 -->
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

	<!-- Supabase -->
	<script type="module" src="../assets/js/supabase.js"></script>

	<!-- Lógica del historial -->
	<script type="module" src="../assets/js/cotizaciones_historial.js"></script>

</body>
</html>
