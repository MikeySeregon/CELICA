<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<title>Categorías | CELICA</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
	<link rel="stylesheet" href="../assets/css/styles.css">
	<link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">
	<link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.bootstrap5.min.css">
</head>
<body>
	<mi-header></mi-header>
	<div class="container mt-4">

		<div class="page-header">
			<div>
				<h3><i class="bi bi-tags-fill" style="color:var(--celica-primary)"></i> Categorías</h3>
				<p>Agrupan los servicios y aportan el código base para sugerir el código de cotización.</p>
			</div>
		</div>

		<!-- Formulario para agregar/editar categoría -->
		<div class="section-card mb-4">
			<div class="section-card-header">
				<h5><i class="bi bi-plus-circle"></i> <span id="formTitulo">Agregar categoría</span></h5>
			</div>

			<form id="formCategoria">
				<input type="hidden" id="id_categoria">

				<div class="row g-3">
					<div class="col-md-3">
						<label for="codigo" class="form-label">Código</label>
						<input type="text" id="codigo" class="form-control" maxlength="10" pattern="[A-Za-z0-9]{1,10}" title="Hasta 10 caracteres alfanuméricos" placeholder="Ej. ALF" required>
					</div>
					<div class="col-md-9">
						<label for="nombre" class="form-label">Nombre</label>
						<input type="text" id="nombre" class="form-control" required>
					</div>
				</div>

				<div class="row g-3 mt-1">
					<div class="col-12">
						<label for="descripcion" class="form-label">Descripción</label>
						<textarea id="descripcion" class="form-control" rows="2"></textarea>
					</div>
				</div>

				<div class="mt-3 d-flex gap-2">
					<button type="submit" class="btn btn-primary">
						<i class="bi bi-save"></i> Guardar
					</button>
					<button type="button" id="btnCancelar" class="btn btn-outline-secondary">
						<i class="bi bi-x-lg"></i> Cancelar
					</button>
				</div>
			</form>
		</div>

		<!-- Filtro y tabla -->
		<div class="section-card">
			<div class="section-card-header">
				<h5><i class="bi bi-funnel"></i> Filtrar</h5>
			</div>

			<div class="btn-group mb-3" role="group" id="filtrosEstado">
				<button type="button" class="btn btn-outline-secondary btn-sm filtro-estado active" data-estado="">Todos</button>
				<button type="button" class="btn btn-outline-success btn-sm filtro-estado" data-estado="1">Activos</button>
				<button type="button" class="btn btn-outline-danger btn-sm filtro-estado" data-estado="2">Inactivos</button>
			</div>

			<table class="table table-bordered nowrap" id="tablaCategorias" style="width:100%">
				<thead>
				<tr>
					<th>ID</th>
					<th>Código</th>
					<th>Nombre</th>
					<th>Descripción</th>
					<th>Estado</th>
					<th>Acciones</th>
				</tr>
				</thead>
				<tbody></tbody>
			</table>
		</div>
	</div>

	<script type="module" src="../assets/js/supabase.js"></script>
	<script type="module" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
	<script type="module">
		import { supabase } from '../assets/js/supabase.js'
		const btnLogout = document.getElementById('btn-logout');
		btnLogout.addEventListener('click', async () =>
		{
				const { error } = await supabase.auth.signOut();
				if (error)
					console.error('Error al cerrar sesión:', error.message);
				else 
					window.location.href = 'login.html';
		});
	</script>
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
	<script type="module" src="../assets/js/categorias.js"></script>
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

	<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
	<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

	<script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
	<script src="https://cdn.datatables.net/responsive/2.5.0/js/responsive.bootstrap5.min.js"></script>
</body>
</html>
